<svg xmlns="http://www.w3.org/2000/svg" width="280" height="70" viewBox="0 0 280 70">
  <!-- Background -->
  <rect width="280" height="70" rx="8" fill="#0F1C2E"/>

  <!-- Network nodes and connecting lines -->
  <!-- Lines first (behind nodes) -->
  <line x1="18" y1="18" x2="38" y2="35" stroke="#4A9FE0" stroke-width="1.2" opacity="0.5"/>
  <line x1="18" y1="18" x2="38" y2="8" stroke="#4A9FE0" stroke-width="1.2" opacity="0.5"/>
  <line x1="38" y1="35" x2="58" y2="22" stroke="#4A9FE0" stroke-width="1.2" opacity="0.5"/>
  <line x1="38" y1="8" x2="58" y2="22" stroke="#4A9FE0" stroke-width="1.2" opacity="0.5"/>
  <line x1="58" y1="22" x2="38" y2="52" stroke="#4A9FE0" stroke-width="1.2" opacity="0.4"/>
  <line x1="38" y1="52" x2="18" y2="52" stroke="#4A9FE0" stroke-width="1.2" opacity="0.4"/>
  <line x1="18" y1="52" x2="18" y2="18" stroke="#4A9FE0" stroke-width="1.2" opacity="0.3"/>
  <line x1="58" y1="22" x2="58" y2="52" stroke="#4A9FE0" stroke-width="1.2" opacity="0.35"/>
  <line x1="58" y1="52" x2="38" y2="52" stroke="#4A9FE0" stroke-width="1.2" opacity="0.4"/>

  <!-- Nodes -->
  <circle cx="18" cy="18" r="4" fill="#4A9FE0"/>
  <circle cx="38" cy="8"  r="3" fill="#4A9FE0" opacity="0.8"/>
  <circle cx="58" cy="22" r="5" fill="#4A9FE0"/>
  <circle cx="38" cy="35" r="3.5" fill="#6AB8F7"/>
  <circle cx="18" cy="52" r="3" fill="#4A9FE0" opacity="0.7"/>
  <circle cx="38" cy="52" r="4" fill="#4A9FE0"/>
  <circle cx="58" cy="52" r="3" fill="#6AB8F7" opacity="0.7"/>

  <!-- "Venture Studio" text -->
  <text x="76" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="18"
        font-weight="700" fill="#FFFFFF" letter-spacing="0.3">Venture Studio</text>

  <!-- "AI Advisor" text -->
  <text x="76" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="15"
        font-weight="500" fill="#4A9FE0" letter-spacing="1.5">AI  ADVISOR</text>

  <!-- Subtle separator line -->
  <line x1="76" y1="35" x2="268" y2="35" stroke="#4A9FE0" stroke-width="0.5" opacity="0.3"/>
</svg>
